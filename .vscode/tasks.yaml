# Regenerate with: `tasks.yaml: watch`
# Icons: https://code.visualstudio.com/api/references/icons-in-labels
version: 2.0.0
options:
  env:
    ENV_FILE: ${workspaceFolder}/.env
    PATH: ${workspaceFolder}/scripts:${workspaceFolder}/packages/auto_js/js/cmake:${env:PATH}
inputs:
  - type: pickString
    id: ivm_target
    description: Which ivm target configuration?
    options:
      - Debug
      - Release
      - RelWithDebInfo
    default: Debug
  - type: pickString
    id: v8_target
    description: Which v8 target to build?
    options:
      - debug
      - optdebug
      - release
    default: debug
  - type: pickString
    id: v8_version
    description: Which v8 revision to checkout?
    # pick from: https://chromiumdash.appspot.com/releases
    # (click the "i" icon)
    options:
      # todo: update v14.9 to chrome 149 final, when it is released
      # note: may need to remove NEON64, or move to clang
      - 14.9.207.27
      - 14.8.178.28
      - 14.7.173.22
      - 14.6.202.31
      - 14.5.201.17
      - 14.4.258.24
      - 14.3.127.17
      - 14.2.231.21
    default: 14.8.178.28
  - type: pickString
    id: nodejs_version
    description:
      Which nodejs version to link against? For debug builds of isolated-vm the headers must match
      the nodejs version.
    options:
      - 24.0.0
      - 22.0.0
      - 20.0.0
    default: 24.0.0
tasks:
  # Default meta-build task
  - label: 'isolated-vm: build'
    group:
      kind: build
      isDefault: true
    dependsOn:
      - 'tasks.yaml: watch'
      - 'tsc: watch'
      - 'ninja: build'
    icon:
      id: plug

  # Watcher which converts this file to `tasks.json`
  # In case you mess it up:
  # v4: yq -o json < .vscode/tasks.yaml > .vscode/tasks.json
  # v3: yq < .vscode/tasks.yaml > .vscode/tasks.json
  - label: 'tasks.yaml: watch'
    type: shell
    command: |
      set -eux; reset
      export TASKS_JSON=.vscode/tasks.json
      export TASKS_YAML=.vscode/tasks.yaml
      export COMMENT="// This file is generated from tasks.yaml. Don't edit it!"
      if echo | yq -o json 2>/dev/null; then
        export YQ="yq -o json"
      else
        export YQ=yq
      fi
      if command -v entr >/dev/null; then
        echo "Watching $TASKS_YAML for changes..."
        echo "$TASKS_YAML" | \
        entr -n sh -c 'date; echo "$COMMENT" > $TASKS_JSON; $YQ < $TASKS_YAML >> $TASKS_JSON'
      else
        echo "One-shot $TASKS_YAML"
        $YQ < .vscode/tasks.yaml > .vscode/tasks.json
      fi
    isBackground: true
    presentation:
      panel: dedicated
      reveal: never
    group: build
    icon:
      id: eye

  # TypeScript watcher
  - label: 'tsc: watch'
    type: shell
    command: npx tsc --build --watch
    problemMatcher: $tsc-watch
    isBackground: true
    presentation:
      panel: dedicated
      reveal: never
    group: build
    icon:
      id: zap

  # cmake: clean
  - label: 'cmake: clean'
    type: shell
    command: rm -rf build
    problemMatcher: []
    presentation:
      close: true
      reveal: never
    icon:
      id: jersey

  # cmake: configure
  - label: 'cmake: configure'
    type: shell
    command: |
      set -eux; reset;
      set -a; source "$ENV_FILE"; source "$V8_BUNDLE_PATH/env"
      cmake \
        -DCMAKE_MODULE_PATH=$(npm exec auto_js_cmake_include) \
        -DCMAKE_BUILD_TYPE=${input:ivm_target} \
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
        ${ECO_STD:+"-DCMAKE_CXX_STDLIB_MODULES_JSON=${ECO_STD}"} \
        -G Ninja -B build
    dependsOn:
      - 'cmake: clean'
    problemMatcher: []
    presentation:
      clear: true
      panel: dedicated
      reveal: always
      showReuseMessage: false
    icon:
      id: wrench

  - label: 'cmake: configure stdlib compat'
    type: shell
    command: |
      set -eux; reset;
      set -a; source "$ENV_FILE"; source "$V8_BUNDLE_PATH/env"
      cmake \
        -DCMAKE_MODULE_PATH=$(npm exec auto_js_cmake_include) \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
        -G Ninja -B build
      cmake \
        -DTEST_STDLIB=stl \
        -DCMAKE_MODULE_PATH=$(npm exec auto_js_cmake_include) \
        -DCMAKE_BUILD_TYPE=Release \
        -G Ninja -B build/for_stl
      cmake \
        -DTEST_STDLIB=libc++ \
        -DCMAKE_MODULE_PATH=$(npm exec auto_js_cmake_include) \
        -DCMAKE_BUILD_TYPE=Release \
        -G Ninja -B build/for_libcxx
      echo 'Build with:'
      echo 'ninja -C build backend_napi_v8 && ninja -C build/for_stl backend_napi_v8 && ninja -C build/for_libcxx backend_napi_v8'
    problemMatcher: []
    icon:
      id: wrench

  # ninja: build
  - label: 'ninja: build'
    type: shell
    command: set -eu; ninja -C build backend_napi_v8
    problemMatcher: $gcc
    presentation:
      clear: true
      panel: dedicated
      reveal: always
      showReuseMessage: false
    group: build
    icon:
      id: flame

  # Select v8 version & apply patches
  - label: 'v8: select'
    type: shell
    command: |
      set -eux; reset;
      set -a; source "$ENV_FILE"
      cd "${V8_SRC_PATH:-/v8}"
      V8_REF=$(PATCH_DIR=${workspaceFolder}/patches v8_select ${input:v8_version})
      export V8_REF
      ivm_write_env V8_REF
    problemMatcher: []
    presentation:
      reveal: always
    icon:
      id: versions

  # Build v8 at /v8
  - label: 'v8: build'
    type: shell
    command: |
      set -eux; reset;
      set -a; source "$ENV_FILE"
      cd "${V8_SRC_PATH:-/v8}"
      TARGET=$(triplet_util %t.${input:v8_target})
      export V8_BUNDLE_PATH="$(pwd)/out/$V8_REF/$TARGET"
      WITHOUT_SYSROOT=1 v8_build "$V8_BUNDLE_PATH"
      ivm_write_env V8_BUNDLE_PATH
    problemMatcher: []
    presentation:
      reveal: always
    icon:
      id: library

  # Download nodejs headers
  - label: 'nodejs: select'
    type: shell
    command: |
      set -eu
      NODE_DIST_DIR=$(nodejs_select ~/local/nodejs/${input:nodejs_version})
      export NODE_DIST_DIR
      ivm_write_env NODE_DIST_DIR
    options:
      cwd: ${userHome}
    problemMatcher: []
    presentation:
      reveal: silent
    icon:
      id: versions

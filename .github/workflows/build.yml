name: Build & Test

on: [push, pull_request]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        node: [ 22, 24 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Add msbuild to PATH
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2
      - name: Install node-gyp
        if: matrix.os == 'windows-latest'
        run: |
          npm install --global node-gyp@latest
      - name: Build
        run: |
          npm install --build-from-source
      - name: Test
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 6
          command: |
            npm test

  build-and-test-alpine:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ 22, 24 ]
      fail-fast: false
    container: node:${{ matrix.node }}-alpine
    steps:
      - uses: actions/checkout@v6
      - name: install build deps
        run: |
          apk add g++ make python3
      - name: Build
        run: |
          npm install --build-from-source
      - name: Test
        run: |
          npm test
        timeout-minutes: 4
  build-and-test-msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      MSYSTEM: UCRT64
      CHERE_INVOKING: 1
      MSYS2_PATH_TYPE: inherit
    strategy:
      matrix:
        node: [ 24 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: jq base-devel binutils git mingw-w64-ucrt-x86_64-toolchain
          pacboy: >-
            yarn:p python:p
          update: true
          path-type: inherit
          release: false
      - name: Build
        run: |
          npm install --build-from-source
          ls -R build
      - name: Test
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 6
          shell: cmd
          command: msys2 -c "npm test"


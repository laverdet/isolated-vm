name: Build prebuildify binaries

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  prebuild:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Add msbuild to PATH
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2
      - name: Install node-gyp
        if: matrix.os == 'windows-latest'
        run: |
          npm install --global node-gyp@latest
      - name: Dependencies
        run: |
          npm install --ignore-scripts
      - name: Build
        run: |
          npm run prebuild
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds

  prebuild-linux:
    strategy:
      matrix:
        arch: [ x64, arm64 ]
        os: [ debian, alpine ]
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        run: |
          docker build . -f Dockerfile.${{ matrix.os }} --output prebuilds
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds

  prebuild-msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      MSYSTEM: UCRT64
      CHERE_INVOKING: 1
      MSYS2_PATH_TYPE: inherit
    strategy:
      matrix:
        node: [ 24 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: jq base-devel binutils git mingw-w64-ucrt-x86_64-toolchain
          pacboy: >-
            yarn:p python:p
          update: true
          path-type: inherit
          release: false
      - name: Build
        run: |
          npm install --build-from-source
          ls -R build
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-windows-latest-x64-mingw
          path: prebuilds

  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: [prebuild, prebuild-linux]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds
      - name: Verify bundled prebuilds
        run: |
          find prebuilds -type f -name '*.node' | sort
      - name: Pack npm tarball
        run: |
          npm pack
      - name: Upload npm tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: '*.tgz'
      - name: Publish
        if: github.repository_owner == 'laverdet'
        run: npm publish

name: Build prebuildify binaries

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  prebuild:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Add msbuild to PATH
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2
      - name: Install node-gyp
        if: matrix.os == 'windows-latest'
        run: |
          npm install --global node-gyp@latest
      - name: Dependencies
        run: |
          npm install --ignore-scripts
      - name: Build
        run: |
          npm run prebuild
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds

  prebuild-linux:
    strategy:
      matrix:
        arch: [ x64, arm64 ]
        os: [ debian, alpine ]
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        run: |
          docker build . -f Dockerfile.${{ matrix.os }} --output prebuilds
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds

  package:
    name: Assemble npm package
    runs-on: ubuntu-latest
    needs: [prebuild, prebuild-linux]
    steps:
      - uses: actions/checkout@v6
      - name: Use nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds
      - name: Verify bundled prebuilds
        run: |
          find prebuilds -type f -name '*.node' | sort
      - name: Pack npm tarball
        run: |
          npm pack
      - name: Upload npm tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: '*.tgz'
